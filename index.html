<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oush League · Norwich</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#F9F7F5;
  font-family:'Plus Jakarta Sans',sans-serif;
  color:#1A1209;
}

.page{
  position:relative;
  min-height:100vh;
  max-width:1200px;
  margin:0 auto;
}

/* world layer */
#worldLayer{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}

/* content */
.content{
  position:relative;
  z-index:1;
  padding:40px;
}

.logo{
  font-family:'Press Start 2P';
  font-size:12px;
  margin-bottom:60px;
}

h1{
  font-family:'Nunito';
  font-size:48px;
  font-weight:900;
  margin-bottom:20px;
}

/* sprites */
.mini{
  position:absolute;
  width:16px;
  height:24px;
  background-image:url("sprites.png");
  background-repeat:no-repeat;
  background-size:800% 500%;
  transform:translate(-50%,-50%);
  opacity:0.12;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<div class="page">

<div id="worldLayer"></div>

<div class="content">
  <div class="logo">OUSH LEAGUE</div>
  <h1>A new kind of sport.</h1>
</div>

</div>

<script>
function addSprite(x,y,col,row){
  const el=document.createElement('div');
  el.className='mini';
  el.style.left=x+'%';
  el.style.top=y+'%';

  const bx=(col/7)*100;
  const by=(row/4)*100;

  el.style.backgroundPosition=bx+'% '+by+'%';

  document.getElementById('worldLayer').appendChild(el);
}

// subtle placements
addSprite(10,20,0,0);
addSprite(16,38,2,0);
addSprite(38,26,4,1);
addSprite(75,22,6,0);
addSprite(86,48,7,1);
addSprite(60,82,3,4);
</script>

</body>
</html>
